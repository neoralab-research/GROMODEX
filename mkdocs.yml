site_name: GROMODEX
site_description: Agent-usable MCP and CLI for GROMACS DOE benchmarking.
repo_name: GROMODEX

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Usage: usage.md
  - Agent CLI: agent-cli.md
  - MCP: mcp.md
  - Development: development.md
  - API Reference: api.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_source: true

markdown_extensions:
  - admonition
  - pymdownx.superfences
  - pymdownx.highlight
